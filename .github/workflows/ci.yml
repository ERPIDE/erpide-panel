name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest

    # Build path uses lazy Prisma init (see src/lib/db.ts) so a placeholder
    # DATABASE_URL is enough — no real DB credentials touch CI.
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
