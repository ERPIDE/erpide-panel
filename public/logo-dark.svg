  <!-- Tagline -->
  <text x="160" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="8" letter-spacing="4" fill="#64748b" text-anchor="middle">ERP ÇÖZÜMLERI HAKKINDA HER ŞEY</text>
